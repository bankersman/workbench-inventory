# Main app only (no label sidecar). See docs/guide/docker.md — "Label sidecar is optional".
#
#   docker compose -f docker-compose.app-only.yml pull
#   docker compose -f docker-compose.app-only.yml up -d

services:
  app:
    image: ghcr.io/bankersman/workbench-inventory:latest
    ports:
      - '3000:3000'
    environment:
      PORT: '3000'
      DB_PATH: /opt/inventory/data/inventory.db
    volumes:
      - ./data:/opt/inventory/data
      - ./backups:/opt/inventory/backups
