services:
  app:
    build: .
    ports:
      - '3000:3000'
      - '5050:5050'
    volumes:
      - ./data:/opt/inventory/data
      - ./backups:/opt/inventory/backups
    environment:
      PORT: '3000'
      DB_PATH: /opt/inventory/data/inventory.db
      LABEL_SIDECAR_URL: http://127.0.0.1:5050
